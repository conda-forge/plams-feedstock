{% set name = "plams" %}
{% set version = "2025.104" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/plams-{{ version }}.tar.gz
  sha256: 6c338018fcab28cca7bdc78dd4ef0316b1b62997b27fe37a6e784be2ea3cfcdb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - dill >=0.2.4
    - natsort
    - numpy <2
    - scipy
    - python >={{ python_min }}

test:
  imports:
    - scm.plams
    - scm.plams.core
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.scm.com/doc/plams/
  summary: Python Library for Automating Molecular Simulations
  license: LGPL-3.0-or-later
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
